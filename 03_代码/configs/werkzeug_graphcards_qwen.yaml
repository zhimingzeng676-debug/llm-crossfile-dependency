# M3-B E18:Qwen2.5-Coder-14B + RAG(图卡片)。与 werkzeug_graphcards 检索完全一致,
# 只把 llm 从 mock 换成真 Qwen,量化"真 LLM 的端到端能力"。
name: werkzeug_graphcards_qwen
repo_root: repos/werkzeug
commits_path: null
index_dir: indexes/werkzeug_graphcards   # 复用已建好的图卡片索引
chunking:
  strategy: function
  include_graph_cards: true
embedder:
  type: sentence_transformer
  model_name: models/bge-small-en-v1.5  # M65 审计:英文/代码任务用 en(R@5 0.93≫zh 0.32),零成本;勿改回 zh(冒烟测试会拦)
backend:
  type: hybrid
  top_k: 5
llm:
  type: api
  model: Qwen/Qwen2.5-Coder-14B-Instruct
  base_url: http://localhost:8001/v1
  temperature: 0.0
prompt_file: configs/prompts/plain.yaml
