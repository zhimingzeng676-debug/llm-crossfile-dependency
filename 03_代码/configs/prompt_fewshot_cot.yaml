# PE 实验:prompt 换成 few-shot + CoT,其余与 baseline 相同。
# 注意:当前 llm 是 mock(不读指令),此实验跑出来分数和 baseline 几乎一样是**预期行为**;
# 它的意义是验证 PE 实验台链路可用,接入真 LLM(llm.type: api)后即可得到真实对比。
name: prompt_fewshot_cot
repo_root: mock_repo
commits_path: data/mock_commits.jsonl
chunking:
  strategy: fixed
  chunk_lines: 40
  overlap: 10
embedder:
  type: hashing
  dim: 512
backend:
  type: local_rag
  top_k: 3
llm:
  type: mock
prompt_file: configs/prompts/fewshot_cot.yaml
