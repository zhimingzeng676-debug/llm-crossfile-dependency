# M3-B:Qwen2.5-Coder-14B + 原始代码 RAG(函数切块 + 混合检索,无图卡片、无 rerank)。
# 用途:① 与 graphcards_qwen 对比"原始代码 vs 我们的依赖卡片";
# ② 验证 INH-07——真模型读到原始的 `class Request(_SansIORequest)` + import 别名,
#    能否自己连上别名继承(不靠我们预解析的卡片)。
name: werkzeug_baseline_qwen
repo_root: repos/werkzeug
commits_path: null
index_dir: indexes/werkzeug_baseline
chunking:
  strategy: function
embedder:
  type: sentence_transformer
  model_name: models/bge-small-en-v1.5  # M65 审计:英文/代码任务用 en(R@5 0.93≫zh 0.32),零成本;勿改回 zh(冒烟测试会拦)
backend:
  type: hybrid
  top_k: 5
llm:
  type: api
  model: Qwen/Qwen2.5-Coder-14B-Instruct
  base_url: http://localhost:8001/v1
  temperature: 0.0
prompt_file: configs/prompts/plain.yaml
