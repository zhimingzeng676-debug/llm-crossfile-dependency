name: werkzeug_pe_cot_deep_ft
repo_root: repos/werkzeug
commits_path: null
index_dir: indexes/werkzeug_full_ft
chunking: {strategy: function, include_graph_cards: true}
embedder: {type: sentence_transformer, model_name: models/bge-small-zh-ft}
backend: {type: hybrid, top_k: 5, rerank: true, rerank_candidates: 80, rerank_scorer: cross_encoder, rerank_model: models/bge-reranker-base}
llm: {type: api, model: Qwen/Qwen2.5-14B-Instruct, base_url: "http://localhost:8001/v1", temperature: 0.0}
prompt_file: configs/prompts/pe_cot.yaml
