# 真实项目 werkzeug 的诚实 baseline:函数切块 + 真语义 embedding + 混合检索,
# 但【不开图卡片、不开 rerank】—— 暴露纯 RAG 在真实代码上的原始瓶颈。
name: werkzeug_baseline
repo_root: repos/werkzeug
commits_path: null            # werkzeug 无 mock 提交历史
chunking:
  strategy: function
embedder:
  type: sentence_transformer
  model_name: models/bge-small-en-v1.5  # M65 审计:英文/代码任务用 en(R@5 0.93≫zh 0.32),零成本;勿改回 zh(冒烟测试会拦)
backend:
  type: hybrid
  top_k: 5                    # 跨文件依赖答案常是多文件,K=5 比 3 更合理
llm:
  type: mock
prompt_file: configs/prompts/plain.yaml
