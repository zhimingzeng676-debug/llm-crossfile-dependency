# E11:与冠军 best_stack_norerank 只差 rerank(开 + cross_encoder 打分器)。
# 四方对照的第四方:无(0.87/0.93)/ 词面(0.83/0.85)/ 双塔(0.78/0.93)/ 本配置。
# 假设(E9 推导):cross-encoder 的查询×文档交互打分带来融合各路都没有的新信息,
# rerank 应当首次成为非负优化;且 recall@10 > recall@3 的差额里有它的获利空间。
name: best_stack_xrerank
repo_root: mock_repo
commits_path: data/mock_commits.jsonl
chunking:
  strategy: function
  include_graph_cards: true
embedder:
  type: sentence_transformer
  model_name: models/bge-small-en-v1.5  # M65 审计:英文/代码任务用 en(R@5 0.93≫zh 0.32),零成本;勿改回 zh(冒烟测试会拦)
backend:
  type: hybrid
  top_k: 3
  rerank: true
  rerank_candidates: 10
  rerank_scorer: cross_encoder
  rerank_model: models/bge-reranker-base
llm:
  type: mock
prompt_file: configs/prompts/plain.yaml
