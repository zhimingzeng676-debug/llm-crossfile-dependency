# M10 八格补全:RAG+FT 格(加 RAG、加 FT,不加 PE)——此前从未单独跑。
# 全栈 RAG(图卡片+混合检索+cross-encoder) + dep(LoRA)基座 + plain prompt。
name: cell_rag_ft
repo_root: repos/werkzeug
commits_path: null
index_dir: indexes/werkzeug_full
embedder: {type: sentence_transformer, model_name: models/bge-small-en-v1.5  # M65 审计:英文/代码任务用 en(R@5 0.93≫zh 0.32),零成本;勿改回 zh(冒烟测试会拦)}
backend: {type: hybrid, top_k: 5, rerank: true, rerank_candidates: 12, rerank_scorer: cross_encoder, rerank_model: models/bge-reranker-base}
llm: {type: api, model: dep, base_url: "http://localhost:8001/v1", temperature: 0.0}
prompt_file: configs/prompts/plain.yaml
