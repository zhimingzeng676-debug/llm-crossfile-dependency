# M4 PE:通用 Qwen2.5-14B + 全栈 RAG + all prompt。与 werkzeug_full_general 只差 prompt_file。
name: werkzeug_pe_all
repo_root: repos/werkzeug
commits_path: null
index_dir: indexes/werkzeug_full
chunking:
  strategy: function
  include_graph_cards: true
embedder:
  type: sentence_transformer
  model_name: models/bge-small-en-v1.5  # M65 审计:英文/代码任务用 en(R@5 0.93≫zh 0.32),零成本;勿改回 zh(冒烟测试会拦)
backend:
  type: hybrid
  top_k: 5
  rerank: true
  rerank_candidates: 12
  rerank_scorer: cross_encoder
  rerank_model: models/bge-reranker-base
llm:
  type: api
  model: Qwen/Qwen2.5-14B-Instruct
  base_url: http://localhost:8001/v1
  temperature: 0.0
prompt_file: configs/prompts/pe_all.yaml
